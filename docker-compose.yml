# file only for local debugging of tracing etc

services:
  jaeger:
    image: jaegertracing/jaeger:2.3.0
    ports:
      - "16686:16686"
      # OTLP 4317/4318 are intentionally NOT exposed on the host: the
      # otel-collector fronts them and routes traces into Jaeger via the
      # internal docker network (jaeger:4317). Services on the host use
      # localhost:4319 (collector OTLP gRPC) / localhost:4320 (OTLP HTTP).
      - "9411:9411"
    volumes:
      - "./docker-support/jaeger.yml:/etc/jaeger/config.yml"
    command: [ "--config", "/etc/jaeger/config.yml" ]
    networks:
      - jaeger
    links:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - "./docker-support/otel/collector.yaml:/etc/otel/config.yaml:ro"
    ports:
      # Collector OTLP endpoints on host — services point here, not at Jaeger.
      - "4319:4317"
      - "4320:4318"
      - "13133:13133"
    depends_on:
      - jaeger
    networks:
      - jaeger

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - "./docker-support/prometheus.yml:/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - jaeger

  echo:
    image: mendhak/http-https-echo:latest
    platform: linux/amd64
    ports:
      - "8081:8080"
    networks:
      - jaeger

  redis:
    image: 'bitnami/redis:latest@sha256:65f55fefc0acd7f1a1da44b39be3044bcfbc03f4a49c4689453097f929f07132'
    environment:
      - REDIS_PASSWORD=foobar
    ports:
      - '6379:6379'
    networks:
      - jaeger

  # --- Ory Hydra OAuth2 / OIDC identity provider (test environment) ---
  #
  # Secrets for seeded clients are generated at runtime by the hydra-seed
  # init container (openssl rand) and written to a bind-mounted volume.
  # No secrets are ever baked into the repo.
  hydra-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
      POSTGRES_DB: hydra
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hydra -d hydra" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - jaeger

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    depends_on:
      hydra-db:
        condition: service_healthy
    environment:
      DSN: "postgres://hydra:hydra@hydra-db:5432/hydra?sslmode=disable"
    command: [ "migrate", "sql", "-e", "--yes" ]
    restart: "no"
    networks:
      - jaeger

  hydra:
    image: oryd/hydra:v2.2.0
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    environment:
      DSN: "postgres://hydra:hydra@hydra-db:5432/hydra?sslmode=disable"
      # System secret for encrypting cookies / signing. The value is
      # generated by the host's `docker-compose up` invocation and NOT
      # committed. If unset, compose will fail loudly — that's intentional.
      SECRETS_SYSTEM: "${HYDRA_SYSTEM_SECRET:?HYDRA_SYSTEM_SECRET must be set; run: export HYDRA_SYSTEM_SECRET=\\$(openssl rand -hex 32)}"
    volumes:
      - "./docker-support/hydra/hydra.yaml:/etc/config/hydra/hydra.yaml:ro"
    command: [ "serve", "all", "--dev", "--config", "/etc/config/hydra/hydra.yaml" ]
    ports:
      - "4444:4444"
      - "4445:4445"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:4444/health/ready >/dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - jaeger

  hydra-seed:
    image: curlimages/curl:8.11.1
    depends_on:
      hydra:
        condition: service_healthy
    user: "0:0"
    environment:
      # Admin URL is used inside the docker network to POST new clients.
      HYDRA_ADMIN_URL: "http://hydra:4445"
      # Public URL is recorded in the seed file that host-side integration
      # tests consume, so it must be reachable from the host (localhost:4444).
      HYDRA_PUBLIC_URL: "http://localhost:4444"
      SECRETS_DIR: "/secrets"
    volumes:
      - "./docker-support/hydra/seed-clients.sh:/seed-clients.sh:ro"
      - "./docker-support/hydra/secrets:/secrets"
    entrypoint: [ "/bin/sh", "/seed-clients.sh" ]
    restart: "no"
    networks:
      - jaeger

networks:
  jaeger:
