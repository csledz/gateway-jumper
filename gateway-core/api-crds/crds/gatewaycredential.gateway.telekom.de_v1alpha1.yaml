---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewaycredentials.gateway.telekom.de
  labels:
    app.kubernetes.io/name: gateway-core
    app.kubernetes.io/component: api-crds
spec:
  group: gateway.telekom.de
  scope: Namespaced
  names:
    kind: GatewayCredential
    listKind: GatewayCredentialList
    plural: gatewaycredentials
    singular: gatewaycredential
    shortNames:
      - gwcred
    categories:
      - gateway
      - gateway-core
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            GatewayCredential carries the authentication material used by a
            GatewayConsumer. The exact fields required depend on the credential type.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - jwt
                    - apikey
                    - basic
                    - oauth2-client
                  description: Credential type; controls which other fields are required.
                issuer:
                  type: string
                  description: Expected JWT 'iss' (required for type=jwt|oauth2-client).
                jwksUri:
                  type: string
                  pattern: '^https?://.+'
                  description: JWKS endpoint (required for type=jwt|oauth2-client).
                secretRef:
                  type: object
                  description: |
                    Reference to a Kubernetes Secret holding the raw credential value
                    (API key, basic auth user/pass, oauth2 client secret).
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                    namespace:
                      type: string
                    key:
                      type: string
                      description: Secret data key. Defaults vary by type.
                scopes:
                  type: array
                  items:
                    type: string
                    minLength: 1
                  description: OAuth2 / JWT scopes granted by this credential.
              x-kubernetes-validations:
                - rule: "self.type != 'jwt' || (has(self.issuer) && has(self.jwksUri))"
                  message: "type=jwt requires issuer and jwksUri"
                - rule: "self.type != 'oauth2-client' || (has(self.issuer) && has(self.secretRef))"
                  message: "type=oauth2-client requires issuer and secretRef"
                - rule: "self.type != 'apikey' || has(self.secretRef)"
                  message: "type=apikey requires secretRef"
                - rule: "self.type != 'basic' || has(self.secretRef)"
                  message: "type=basic requires secretRef"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Issuer
          type: string
          jsonPath: .spec.issuer
        - name: Secret
          type: string
          jsonPath: .spec.secretRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
