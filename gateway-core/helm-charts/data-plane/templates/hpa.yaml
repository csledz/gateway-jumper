{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "data-plane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-plane.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "data-plane.fullname" . }}
  minReplicas: {{ index .Values.hpa "min-replicas" }}
  maxReplicas: {{ index .Values.hpa "max-replicas" }}
  metrics:
    {{- with (index .Values.hpa "target-cpu-utilization-percentage") }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with (index .Values.hpa "target-memory-utilization-percentage") }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
{{- end }}
