{{/*
SPDX-FileCopyrightText: 2026 Deutsche Telekom AG

SPDX-License-Identifier: Apache-2.0

Keypair secret: rendered only when no existing-secret is referenced. The
values carry the PEM material directly — for production, supply them via
`--set-file keypair.signing-key=./signing.key`.
*/}}
{{- $existing := index .Values.keypair "existing-secret" -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "data-plane.keypairSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-plane.labels" . | nindent 4 }}
  annotations:
    # Helm owns this object only when no external secret is referenced.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  signing.key: |
{{ (index .Values.keypair "signing-key" | default "# supplied via --set-file keypair.signing-key") | indent 4 }}
  signing.crt: |
{{ (index .Values.keypair "signing-certificate" | default "# supplied via --set-file keypair.signing-certificate") | indent 4 }}
{{- end }}
