apiVersion: v2
# Helm 3+ rejects "/" in the chart name, so we use the hyphenated form here
# and expose the canonical "gateway-core/data-plane" identifier via the
# gateway.telekom.de/chart-name annotation below.
name: gateway-core-data-plane
description: |
  Helm chart for the gateway-core data plane (proxy). Deploys the Spring
  Cloud Gateway-based proxy that terminates routes, enforces rate limits,
  mTLS, and zone federation for cross-zone mesh traffic.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - gateway
  - data-plane
  - proxy
  - spring-cloud-gateway
maintainers:
  - name: telekom/gateway
    url: https://github.com/telekom/gateway-jumper
home: https://github.com/telekom/gateway-jumper
sources:
  - https://github.com/telekom/gateway-jumper
annotations:
  category: Networking
  licenses: Apache-2.0
  gateway.telekom.de/chart-name: gateway-core/data-plane
