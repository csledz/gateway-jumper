# OpenTelemetry Collector config for local gateway-core development.
#
# Listens OTLP gRPC on 4317 and HTTP on 4318 (mapped on the host to 4319/4320
# to avoid collision with Jaeger, which also exposes OTLP on 4317/4318).
#
# Forwards traces to the bundled Jaeger (OTLP gRPC, container DNS name
# "jaeger" on port 4317 inside the jaeger network).
#
# Metrics and logs go to a debug exporter (stdout) — turn these into an OTLP
# exporter once the target backend is known (Tempo, Honeycomb, Datadog, ...).
#
# SAFETY: no auth headers in this file. If the upstream OTLP target needs
# authentication, inject it at deploy time (Helm values, k8s secret) — never
# commit a literal token here.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 20

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8890
