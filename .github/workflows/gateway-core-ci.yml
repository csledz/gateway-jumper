name: Gateway Core CI

# PR-time validation for the gateway-core Maven modules. Each module under
# `gateway-core/<module>/` is built in its own matrix leg so failures are
# attributed to a single component and can run in parallel.

on:
  pull_request:
    paths:
      - 'gateway-core/**'
      - '.github/workflows/gateway-core-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'gateway-core/**'
      - '.github/workflows/gateway-core-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '21' }}
  JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION || 'zulu' }}

jobs:
  discover-modules:
    name: Discover gateway-core modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      java-modules: ${{ steps.discover.outputs.java-modules }}
      has-modules: ${{ steps.discover.outputs.has-modules }}
      has-java-modules: ${{ steps.discover.outputs.has-java-modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Find modules
        id: discover
        run: |
          set -euo pipefail
          # A gateway-core module is any directory one level below gateway-core/
          # that contains a pom.xml. Modules with Java sources also run Spotless;
          # pom-packaging / infra-only modules (helm-charts, api-crds) skip it.
          modules=()
          java_modules=()
          if [ -d gateway-core ]; then
            while IFS= read -r pom; do
              dir="$(dirname "$pom")"
              name="${dir#gateway-core/}"
              modules+=("${name}")
              if [ -d "${dir}/src/main/java" ] || [ -d "${dir}/src/test/java" ]; then
                java_modules+=("${name}")
              fi
            done < <(find gateway-core -mindepth 2 -maxdepth 2 -name pom.xml | sort)
          fi
          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No gateway-core modules found yet."
            echo "modules=[]" >> "${GITHUB_OUTPUT}"
            echo "java-modules=[]" >> "${GITHUB_OUTPUT}"
            echo "has-modules=false" >> "${GITHUB_OUTPUT}"
            echo "has-java-modules=false" >> "${GITHUB_OUTPUT}"
          else
            json="$(printf '%s\n' "${modules[@]}" | jq -R . | jq -s -c .)"
            java_json="$(printf '%s\n' "${java_modules[@]}" | jq -R . | jq -s -c .)"
            echo "Discovered modules: ${json}"
            echo "Java modules:       ${java_json}"
            echo "modules=${json}" >> "${GITHUB_OUTPUT}"
            echo "java-modules=${java_json}" >> "${GITHUB_OUTPUT}"
            echo "has-modules=true" >> "${GITHUB_OUTPUT}"
            if [ "${#java_modules[@]}" -gt 0 ]; then
              echo "has-java-modules=true" >> "${GITHUB_OUTPUT}"
            else
              echo "has-java-modules=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

  spotless:
    name: Spotless (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [discover-modules]
    if: needs.discover-modules.outputs.has-java-modules == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.java-modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      - name: Check code formatting
        working-directory: gateway-core/${{ matrix.module }}
        run: ../../mvnw -B com.diffplug.spotless:spotless-maven-plugin:check

  verify:
    name: Verify (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [discover-modules, spotless]
    if: needs.discover-modules.outputs.has-modules == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      - name: Build & verify
        working-directory: gateway-core/${{ matrix.module }}
        run: ../../mvnw -B -am verify
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: surefire-reports-${{ matrix.module }}
          path: |
            gateway-core/${{ matrix.module }}/target/surefire-reports/
            gateway-core/${{ matrix.module }}/target/failsafe-reports/
          if-no-files-found: ignore
      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: cucumber-reports-${{ matrix.module }}
          path: |
            gateway-core/${{ matrix.module }}/target/cucumber-reports/
            gateway-core/${{ matrix.module }}/target/cucumber/
          if-no-files-found: ignore

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [discover-modules, spotless, verify]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Modules:   ${{ needs.discover-modules.outputs.modules }}"
          echo "Spotless:  ${{ needs.spotless.result }}"
          echo "Verify:    ${{ needs.verify.result }}"
          if [ "${{ needs.discover-modules.outputs.has-modules }}" != "true" ]; then
            echo "No modules discovered; skipping fail check."
            exit 0
          fi
          # Spotless runs only when at least one Java module is present; treat
          # a "skipped" spotless result as success in that case, and evaluate
          # verify strictly.
          if [ "${{ needs.discover-modules.outputs.has-java-modules }}" = "true" ]; then
            case "${{ needs.spotless.result }}" in
              success) ;;
              *) echo "Spotless failed: ${{ needs.spotless.result }}"; exit 1 ;;
            esac
          fi
          case "${{ needs.verify.result }}" in
            success) ;;
            *) echo "Verify failed: ${{ needs.verify.result }}"; exit 1 ;;
          esac
